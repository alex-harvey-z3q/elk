---
name: CI

"on":
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUPPET_GEM_VERSION: "~> 8.0"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: bundle exec rake lint
      - run: bundle exec rake spec_prep
      - run: bundle exec rake spec
      - run: python -m pip install yamllint
      - run: yamllint -c yamllint.yml spec/fixtures/hiera.yaml spec/fixtures/hiera.yaml.acceptance spec/fixtures/hieradata/common.yaml .github/workflows/ci.yml .fixtures.yml infra/azure-one-node/cloud-init.yaml
