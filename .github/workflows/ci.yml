---
name: CI

"on":
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUPPET_GEM_VERSION: "~> 8.0"
      LAPTOP_IP: 203.0.113.10
      AZURE_ONE_NODE_ADMIN_SSH_PUBLIC_KEY: >-
        ssh-ed25519
        AAAAC3NzaC1lZDI1NTE5AAAAIDummyStaticKeyForAzureOneNodeTests
        ci@example
      AZURE_MULTI_NODE_ADMIN_SSH_PUBLIC_KEY: >-
        ssh-ed25519
        AAAAC3NzaC1lZDI1NTE5AAAAIDummyStaticKeyForAzureMultiNodeTests
        ci@example
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: python -m pip install yamllint
      - run: sudo apt-get update
      - run: sudo apt-get install -y cloud-init
      - name: Ensure Azure CLI and Bicep are available
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi
          az bicep install
      - run: bundle exec rake lint
      - run: bundle exec rake spec_prep
      - run: bundle exec rake spec
      - run: bundle exec rake azure:one_node:static
      - run: bundle exec rake azure:multi_node:static
